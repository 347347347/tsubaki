<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tsubaki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8a97e;
    --accent2: #7ec8a9;
    --text: #e8e4dc;
    --muted: #6b6860;
    --danger: #c87e7e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .logo { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; }
  .logo-dot { color: var(--accent2); }
  .header-status { margin-left: auto; color: var(--muted); font-size: 11px; }

  .layout { display: grid; grid-template-columns: 1fr 380px; gap: 0; height: calc(100vh - 65px); }
  .main-panel { border-right: 1px solid var(--border); overflow-y: auto; padding: 28px 32px; }
  .side-panel { overflow-y: auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 20px; }

  .section-title { font-family: 'Shippori Mincho', serif; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-accent { background: var(--accent); border-color: var(--accent); color: #0e0e0e; font-weight: 500; }
  .btn-accent:hover { background: #d4b990; border-color: #d4b990; color: #0e0e0e; }
  .btn-green { background: var(--accent2); border-color: var(--accent2); color: #0e0e0e; font-weight: 500; }
  .btn-green:hover { background: #94d4bb; border-color: #94d4bb; color: #0e0e0e; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  .job-list { display: flex; flex-direction: column; gap: 10px; }
  .job-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; cursor: pointer; transition: border-color 0.15s; }
  .job-card:hover { border-color: var(--accent); }
  .job-card.selected { border-color: var(--accent); background: #1a1814; }
  .job-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .job-title { font-family: 'Shippori Mincho', serif; font-size: 14px; line-height: 1.5; }
  .job-price { font-size: 12px; color: var(--accent); white-space: nowrap; font-weight: 500; }
  .job-meta { display: flex; gap: 12px; color: var(--muted); font-size: 11px; }
  .job-summary { margin-top: 8px; color: var(--muted); font-size: 11px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .job-actions { display: flex; gap: 8px; margin-top: 12px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  .panel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
  .panel-card-title { font-family: 'Shippori Mincho', serif; font-size: 13px; color: var(--accent); margin-bottom: 14px; }

  textarea, input[type="text"], input[type="date"], input[type="number"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; padding: 10px 12px;
    resize: vertical; outline: none; transition: border-color 0.15s;
  }
  textarea:focus, input:focus { border-color: var(--accent); }
  .form-row { margin-bottom: 10px; }
  .form-label { color: var(--muted); font-size: 11px; margin-bottom: 4px; display: block; }

  .proposal-text { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 14px; font-size: 12px; line-height: 1.8; white-space: pre-wrap; min-height: 120px; color: var(--text); }
  .proposal-placeholder { color: var(--muted); font-style: italic; }

  /* キーワードタグ */
  .tag-area { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; min-height: 42px; cursor: text; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px; font-size: 11px; color: var(--text); }
  .tag-remove { color: var(--muted); cursor: pointer; font-size: 13px; line-height: 1; }
  .tag-remove:hover { color: var(--danger); }
  .tag-input { border: none; background: transparent; color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px; outline: none; min-width: 80px; flex: 1; padding: 2px 4px; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px 18px; font-size: 12px; opacity: 0; transform: translateY(8px); transition: all 0.2s; z-index: 200; max-width: 300px; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { border-color: var(--accent2); color: var(--accent2); }
  #toast.error { border-color: var(--danger); color: var(--danger); }

  .fetch-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .job-count { color: var(--muted); font-size: 11px; }
  .calendar-form { display: flex; flex-direction: column; gap: 8px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">tsubaki<span class="logo-dot">.</span></div>
  <div class="header-status" id="header-status">準備完了</div>
</header>

<div class="layout">
  <!-- 左：案件一覧 -->
  <div class="main-panel">
    <div class="fetch-bar">
      <div class="section-title" style="margin-bottom:0;flex:1">案件一覧</div>
      <span class="job-count" id="job-count"></span>
      <button class="btn btn-accent" style="margin-left:12px" onclick="fetchJobs()" id="fetch-btn">▶ 案件を取得</button>
    </div>
    <div class="job-list" id="job-list">
      <div class="empty-state">
        <div class="empty-icon">⟳</div>
        <div>「案件を取得」を押してください</div>
      </div>
    </div>
  </div>

  <!-- 右：サイドパネル -->
  <div class="side-panel">

    <!-- フィルター設定 -->
    <div class="panel-card">
      <div class="panel-card-title">フィルター設定</div>
      <div class="form-row">
        <label class="form-label">キーワード（Enterで追加）</label>
        <div class="tag-area" id="tag-area" onclick="document.getElementById('tag-input').focus()">
          <input class="tag-input" id="tag-input" placeholder="キーワードを入力..." onkeydown="handleTagInput(event)">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">最低単価（円）</label>
        <input type="number" id="min-price" value="13000" step="1000" min="0">
      </div>
      <button class="btn btn-green" style="width:100%;justify-content:center" onclick="saveFilter()" id="filter-btn">
        設定を保存
      </button>
    </div>

    <!-- 提案文生成 -->
    <div class="panel-card">
      <div class="panel-card-title">提案文生成</div>
      <div class="form-row">
        <label class="form-label">案件タイトル</label>
        <input type="text" id="prop-title" placeholder="案件を選択すると自動入力">
      </div>
      <div class="form-row">
        <label class="form-label">概要</label>
        <textarea id="prop-summary" rows="3" placeholder="案件の概要..."></textarea>
      </div>
      <button class="btn btn-accent" style="width:100%;justify-content:center;margin-bottom:12px" onclick="generateProposal()" id="propose-btn">生成する</button>
      <div class="form-label">生成結果</div>
      <div class="proposal-text" id="proposal-output"><span class="proposal-placeholder">ここに提案文が表示されます</span></div>
      <button class="btn" style="width:100%;justify-content:center;margin-top:8px" onclick="copyProposal()">コピー</button>
    </div>

    <!-- カレンダー登録 -->
    <div class="panel-card">
      <div class="panel-card-title">カレンダー登録</div>
      <div class="calendar-form">
        <div class="form-row">
          <label class="form-label">案件タイトル</label>
          <input type="text" id="cal-title" placeholder="案件を選択すると自動入力">
        </div>
        <div class="form-row">
          <label class="form-label">納期</label>
          <input type="date" id="cal-deadline">
        </div>
        <div class="form-row">
          <label class="form-label">単価</label>
          <input type="text" id="cal-price" placeholder="例: 20,000円">
        </div>
        <div class="form-row">
          <label class="form-label">備考</label>
          <input type="text" id="cal-notes" placeholder="任意">
        </div>
        <button class="btn btn-green" style="width:100%;justify-content:center" onclick="addCalendar()" id="cal-btn">カレンダーに登録</button>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
let selectedJob = null;
let currentKeywords = [];

// ==============================
// 初期化
// ==============================
window.addEventListener('DOMContentLoaded', loadFilter);

async function loadFilter() {
  try {
    const res = await fetch('/api/filter');
    const data = await res.json();
    if (!data.ok) return;
    currentKeywords = data.filter.keywords || [];
    document.getElementById('min-price').value = data.filter.min_price || 13000;
    renderTags();
  } catch(e) {}
}

// ==============================
// キーワードタグ
// ==============================
function renderTags() {
  const area = document.getElementById('tag-area');
  const input = document.getElementById('tag-input');
  // 既存タグ削除
  area.querySelectorAll('.tag').forEach(t => t.remove());
  // タグを入力欄の前に挿入
  currentKeywords.forEach((kw, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${escHtml(kw)}<span class="tag-remove" onclick="removeTag(${i})">×</span>`;
    area.insertBefore(tag, input);
  });
}

function handleTagInput(e) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,/g, '');
    if (val && !currentKeywords.includes(val)) {
      currentKeywords.push(val);
      renderTags();
    }
    e.target.value = '';
  } else if (e.key === 'Backspace' && e.target.value === '' && currentKeywords.length > 0) {
    currentKeywords.pop();
    renderTags();
  }
}

function removeTag(i) {
  currentKeywords.splice(i, 1);
  renderTags();
}

// ==============================
// フィルター保存
// ==============================
async function saveFilter() {
  const minPrice = parseInt(document.getElementById('min-price').value) || 0;
  if (currentKeywords.length === 0) { toast('キーワードを1つ以上入力してください', 'error'); return; }

  const btn = document.getElementById('filter-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 保存中...';

  try {
    const res = await fetch('/api/filter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keywords: currentKeywords, min_price: minPrice })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    toast('フィルター設定を保存しました');
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '設定を保存';
  }
}

// ==============================
// 案件取得
// ==============================
async function fetchJobs() {
  const btn = document.getElementById('fetch-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 取得中...';
  setStatus('RSSを取得中...');

  try {
    const res = await fetch('/api/fetch-jobs', { method: 'POST' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    renderJobs(data.jobs);
    document.getElementById('job-count').textContent = `${data.jobs.length} 件`;
    setStatus(`${data.jobs.length} 件取得`);
    toast(`新着 ${data.jobs.length} 件を取得しました`);
  } catch(e) {
    toast(e.message, 'error');
    setStatus('エラー');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '▶ 案件を取得';
  }
}

function renderJobs(jobs) {
  const list = document.getElementById('job-list');
  if (jobs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">✓</div><div>新着案件はありません</div></div>';
    return;
  }
  list.innerHTML = jobs.map((job, i) => `
    <div class="job-card" id="job-${i}" onclick="selectJob(${i})">
      <div class="job-card-header">
        <div class="job-title">${escHtml(job.title)}</div>
        <div class="job-price">${escHtml(job.price)}</div>
      </div>
      <div class="job-meta">
        <span>${escHtml(job.source)}</span>
        <span>${escHtml(job.date ? job.date.slice(0,10) : '')}</span>
      </div>
      <div class="job-summary">${escHtml(job.summary)}</div>
      <div class="job-actions">
        <a href="${escHtml(job.url)}" target="_blank" class="btn" onclick="event.stopPropagation()">詳細を見る</a>
      </div>
    </div>
  `).join('');
  window._jobs = jobs;
}

function selectJob(i) {
  document.querySelectorAll('.job-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`job-${i}`).classList.add('selected');
  const job = window._jobs[i];
  selectedJob = job;
  document.getElementById('prop-title').value = job.title;
  document.getElementById('prop-summary').value = job.summary;
  document.getElementById('cal-title').value = job.title;
  document.getElementById('cal-price').value = job.price !== '金額不明' ? job.price : '';
}

// ==============================
// 提案文生成
// ==============================
async function generateProposal() {
  const title   = document.getElementById('prop-title').value.trim();
  const summary = document.getElementById('prop-summary').value.trim();
  if (!title) { toast('タイトルを入力してください', 'error'); return; }

  const btn = document.getElementById('propose-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中...';
  setStatus('提案文を生成中...');
  document.getElementById('proposal-output').innerHTML = '<span class="proposal-placeholder">生成中...</span>';

  try {
    const res = await fetch('/api/propose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, summary })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    document.getElementById('proposal-output').textContent = data.proposal;
    setStatus('提案文生成完了');
    toast('提案文を生成しました');
  } catch(e) {
    document.getElementById('proposal-output').innerHTML = `<span class="proposal-placeholder">${escHtml(e.message)}</span>`;
    toast(e.message, 'error');
    setStatus('エラー');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '生成する';
  }
}

function copyProposal() {
  const text = document.getElementById('proposal-output').textContent;
  if (!text || text === 'ここに提案文が表示されます') return;
  navigator.clipboard.writeText(text).then(() => toast('コピーしました'));
}

// ==============================
// カレンダー登録
// ==============================
async function addCalendar() {
  const title    = document.getElementById('cal-title').value.trim();
  const deadline = document.getElementById('cal-deadline').value;
  const price    = document.getElementById('cal-price').value.trim();
  const notes    = document.getElementById('cal-notes').value.trim();
  const url      = selectedJob ? selectedJob.url : '';

  if (!title)    { toast('タイトルを入力してください', 'error'); return; }
  if (!deadline) { toast('納期を入力してください', 'error'); return; }

  const btn = document.getElementById('cal-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 登録中...';
  setStatus('カレンダーに登録中...');

  try {
    const res = await fetch('/api/add-calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, deadline, price, url, notes })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error);
    toast('カレンダーに登録しました');
    setStatus('登録完了');
    if (data.link) window.open(data.link, '_blank');
  } catch(e) {
    toast(e.message, 'error');
    setStatus('エラー');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'カレンダーに登録';
  }
}

// ==============================
// ユーティリティ
// ==============================
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2500);
}

function setStatus(msg) {
  document.getElementById('header-status').textContent = msg;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
</body>
</html>
